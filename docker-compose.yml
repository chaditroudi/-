services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    working_dir: /app
    command: npm run server:dev
    env_file:
      - .env
    environment:
      PORT: 4000
      API_HOST: 0.0.0.0
      MONGODB_URI: ${MONGODB_URI:?Set MONGODB_URI in .env to your MongoDB Atlas connection string}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-date_harvest_hub}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    ports:
      - "${DOCKER_API_HOST:-0.0.0.0}:${DOCKER_API_PORT:-4000}:4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    working_dir: /app
    command: npm run dev:client -- --host 0.0.0.0 --port 8080
    environment:
      VITE_API_URL: /api
      VITE_API_PROXY_TARGET: http://api:4000
      VITE_USE_POLLING: "true"
      VITE_POLLING_INTERVAL: "500"
      VITE_HMR_CLIENT_PORT: "8080"
    depends_on:
      - api
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    ports:
      - "8080:8080"

volumes:
  api_node_modules:
  web_node_modules:
